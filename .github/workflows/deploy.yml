# Deploy to VPS when main is updated.
# Required GitHub repo secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY
# Optional: VPS_PORT (default 22), VPS_APP_DIR (default /var/www/WhatsApp-audit)

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 12m
          script_stop: true
          script: |
            export APP_DIR="/var/www/WhatsApp-audit"
            export DEPLOY_BRANCH=main
            export PM2_APP=g6-audit
            export PORT=3010
            bash "${APP_DIR}/scripts/deploy.sh"
